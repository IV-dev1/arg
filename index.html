<!DOCTYPE html>
<html>
<head>
<title>Transmission Terminal</title>

<style>
body{
    background:black;
    color:#00ff9c;
    font-family:monospace;
    text-align:center;
    margin-top:100px;
}

input{
    background:black;
    border:1px solid #00ff9c;
    color:#00ff9c;
    padding:10px;
}

button{
    background:#00ff9c;
    border:none;
    padding:10px;
}

#result{
    margin-top:30px;
}

#result::after {
    content: "_";
    animation: blink 1s infinite;
}

@keyframes blink {
    0% {opacity:1;}
    50% {opacity:0;}
    100% {opacity:1;}
}
    
</style>

</head>

<body>

<h1>TRANSMISSION TERMINAL</h1>

<p>Enter Phrase</p>

<input id="phraseInput" type="text">
<button onclick="submitPhrase()">Submit</button>

<div id="result"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyMYdQ-lrk0TNKZAizU5bd7XEWJkWTOpcH8KnBT7EevcPqJEBY3hG-mCoWWx0MmFOsa/exec";

async function submitPhrase(){

  const phrase = document.getElementById("phraseInput").value;

  const res = await fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      phrase: phrase
    })
  });

  const data = await res.json();

  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "";

  if(data.success){

      if(data.type === "link"){
        resultDiv.innerHTML =
          `<a href="${data.content}" style="color:#00ff9c">ACCESS UNLOCKED</a>`;
      }

      if(data.type === "text"){
        typeWriter(
        data.content,
        resultDiv
        );
      }

  }else{
      terminalThenType(
        [
        "> ACCESSING ARCHIVE...",
        "> CONNECTING...",
        "> CONNECTION LOST"
        ],
        "Data Rejected.",
        resultDiv
        );
  }

}

function terminalThenType(logLines, finalText, element, delayBetween = 1000) {
  let lineIndex = 0;

  function printLine() {
    if (lineIndex < logLines.length) {
      element.innerHTML += logLines[lineIndex] + "<br>";
      lineIndex++;
      setTimeout(printLine, delayBetween);
    } else {
      typeWriter(finalText, element);
    }
  }

  printLine();
}

function typeWriter(text, element, speed = 20){
  let i = 0;

  function typing(){
    if(i < text.length){
      const char = text.charAt(i);
      element.innerHTML += (char === "\n" ? "<br>" : char);
      i++;
      setTimeout(typing, speed);
    }
  }

  typing();
}

</script>
</body>
</html>
